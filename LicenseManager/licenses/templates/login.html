{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="height: 80vh;">
    <div class="card p-5" style="width: 400px;">
        <h3 class="text-center mb-4">🔐 الدخول للنظام</h3>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="password" name="password" class="form-control form-control-lg text-center"
                    placeholder="كلمة المرور" autofocus>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg">دخول</button>
        </form>
    </div>
</div>
{% endblock %}
