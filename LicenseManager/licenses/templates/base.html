<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesApp Commander</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #F4F6F8;
            color: #111827;
        }

        .card {
            background-color: #FFFFFF;
            border: 1px solid #e6e8eb;
            border-radius: 8px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            color: #111827;
        }

        .stat-card {
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .sidebar {
            min-height: 100vh;
            background: #FFFFFF;
            color: #111827;
            border-left: 1px solid #e6e8eb;
        }

        .sidebar a {
            color: #667382;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .sidebar a:hover {
            background: rgba(26,69,113,0.08);
            color: #1A4571;
        }

        .sidebar a.active {
            background: rgba(26,69,113,0.1);
            color: #1A4571;
            font-weight: bold;
        }
        
        .sidebar h4 {
            color: #111827;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            {% if request.session.is_logged_in %}
            <div class="col-md-2 sidebar p-3">
                <h4 class="text-center mb-4 fw-bold">🚀 Commander</h4>
<a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">📊
    الإحصائيات</a>
<a href="{% url 'add_client' %}" class="{% if request.resolver_match.url_name == 'add_client' %}active{% endif %}">👤
    عميل جديد</a>
<a href="{% url 'clients_list' %}" class="{% if request.resolver_match.url_name == 'clients_list' %}active{% endif %}">👥
    إدارة العملاء</a>
<a href="{% url 'add_license' %}" class="{% if request.resolver_match.url_name == 'add_license' %}active{% endif %}">🔑
    إصدار رخصة</a>
<a href="{% url 'licenses_list' %}" class="{% if request.resolver_match.url_name == 'licenses_list' %}active{% endif %}">📝
    إدارة التراخيص</a>
                <hr>
                <a href="{% url 'logout' %}" class="text-danger">تسجيل خروج</a>
            </div>
            {% endif %}

            <div class="col p-4">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

</body>

</html>
